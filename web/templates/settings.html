<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI-cutting 设置</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="/" aria-label="返回 AI-cutting 首页">
        <span class="brand-mark" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M4 7.5h7.5M4 16.5h7.5M15.5 4l4 8-4 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span>
          <strong>AI-cutting</strong>
          <small>设置</small>
        </span>
      </a>
      <nav class="env" aria-label="主要导航">
        <a class="top-link" href="/">首页</a>
        <a class="top-link" href="/style-presets">样式预设</a>
      </nav>
    </header>

    <main class="workspace">
      <section class="hero-panel job-hero">
        <div>
          <p class="eyebrow">设置</p>
          <h1>把低频配置收在这里。</h1>
          <p class="hero-copy">首页只负责上传和开始处理；API 凭证、字幕微调和卡壳检测在设置页维护。</p>
        </div>
      </section>

      <div class="layout single">
        <section class="panel task-panel">
          {% if saved %}
          <div class="success-banner">
            <strong>设置已保存</strong>
            <p>新的任务会使用这里的配置。</p>
          </div>
          {% endif %}

          <form action="/settings" method="post" enctype="multipart/form-data" class="job-form">
            <fieldset class="credential-box">
              <legend>火山引擎 API</legend>
              <p class="field-hint">用于识别字幕。Access Token 会保存在本机设置文件里，不会写入任务日志。</p>
              <div class="credential-grid">
                <label class="field">
                  <span>APP ID</span>
                  <input type="text" name="volc_app_id" value="{{ settings.volc_app_id }}" placeholder="例如：209222262" autocomplete="off">
                </label>
                <label class="field">
                  <span>Access Token</span>
                  <input type="password" name="volc_access_token" placeholder="{{ '已保存，留空则不修改' if settings.has_volc_access_token else '粘贴火山引擎 Access Token' }}" autocomplete="off">
                </label>
              </div>
            </fieldset>

            <fieldset>
              <legend>字幕与剪辑微调</legend>
              <div class="credential-grid">
                <label class="field">
                  <span>字幕整体偏移（秒）</span>
                  <input type="number" name="subtitle_delay" step="0.1" value="{{ settings.subtitle_delay }}">
                </label>
                <label class="check">
                  <input type="checkbox" name="detect_disfluency" value="1" {{ 'checked' if settings.detect_disfluency else '' }}>
                  <span>检测疑似卡壳 / 重复</span>
                </label>
              </div>
            </fieldset>

            <button class="primary-button" type="submit">保存设置</button>
          </form>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
